---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-apps
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: master
  url: ssh://git@github.com/Guybrush21/homelab.git
  secretRef:
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k3s/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-apps

apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: traefik
data:
  traefik.yaml: |
    # Traefik static configuration
    api:
      dashboard: true
      insecure: false

    ping:
      entryPoint: "admin"

    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
      admin: 
        address: ":8080"

    certificatesResolvers:
      cloudflare:
        acme:
          email: nicholasp21@gmail.com
          storage: /data/acme.json
          caServer: https://acme-staging-v02.api.letsencrypt.org/directory
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"
              - "8.8.8.8:53"

    providers:
      kubernetesCRD:
        allowCrossNamespace: true
      kubernetesIngress:
        allowExternalNameServices: true

    log:
      level: INFO 

    accessLog: {}
---

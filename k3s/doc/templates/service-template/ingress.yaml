apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: SERVICE_NAME-ingress
  namespace: NAMESPACE
  annotations:
    # For nginx-ingress:
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # For Traefik:
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
  - host: HOSTNAME  # e.g., myservice.elaine.pw
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: SERVICE_NAME-service
            port:
              number: SERVICE_PORT
  
  # TLS configuration (if using cert-manager)
  # tls:
  # - hosts:
  #   - HOSTNAME
  #   secretName: SERVICE_NAME-tls

---
# Note: If using Caddy, add this to Caddyfile instead:
# 
# @SERVICE_NAME host HOSTNAME
# handle @SERVICE_NAME {
#   reverse_proxy SERVICE_NAME-service.NAMESPACE.svc.cluster.local:SERVICE_PORT
# }

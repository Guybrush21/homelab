apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: homelab
data:
  Caddyfile: |
    {
        http_port 80
        https_port 443
    }

    # Route local traffic directly to our vanilla Homer service
    homer.local:80 {
        reverse_proxy homer-service.homelab.svc.cluster.local:80
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-ingress
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy-ingress
  template:
    metadata:
      labels:
        app: caddy-ingress
    spec:
      containers:
        - name: caddy
          image: caddy:2.7.6-alpine
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          volumeMounts:
            - name: config-volume
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
      volumes:
        - name: config-volume
          configMap:
            name: caddy-config
---
apiVersion: v1
kind: Service
metadata:
  name: caddy-loadbalancer
  namespace: homelab
spec:
  type: LoadBalancer # Tells MetalLB to attach your local network IP here
  selector:
    app: caddy-ingress
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443

apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer
  template:
    metadata:
      labels:
        app: homer
    spec:
      containers:
        - name: homer-container
          image: b4bz/homer
          ports:
            - containerPort: 8080
          # Your explicit storage rule: mounting your fast SSD directly
          volumeMounts:
            - name: homer-state
              mountPath: /www/assets
      volumes:
        - name: homer-state
          hostPath:
            path: /var/lib/homelab-state/homer
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: homer-service
  namespace: homelab
spec:
  selector:
    app: homer
  ports:
    - protocol: TCP
      port: 80       # Port other apps inside the cluster will use to talk to Homer
      targetPort: 8080 # The actual port the container is listening on

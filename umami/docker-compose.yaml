---
services:
  umami:
    container_name: umami
    image: ghcr.io/umami-software/umami:postgresql-latest
    expose: 
        - 3000
    # ports:
    #   - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${APP_SECRET} 
    depends_on:
      db:
        condition: service_healthy
    init: true
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:3000/api/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reverseproxy
      - default
    labels:
      traefik.enable: "true"
      traefik.http.routers.umami.tls.certresolver: "cfresolver"

  db:
    container_name: db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    networks:
      - default
    volumes:
      - ./container-data/umami-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
  reverseproxy:
    external: true
